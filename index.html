<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pakistan Weather App</title>
    
</head>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    background:white;
    width:350px;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

h1{
    margin-bottom:20px;
}

.search-box{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    padding:10px 15px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.weather-box{
    margin-top:25px;
}

#temp{
    font-size:50px;
    margin:10px 0;
}

.details{
    margin-top:15px;
}
</style>
<body>

    <div class="container">
        <h1>🌤 Pakistan Weather App</h1>

        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter City Name">
            <button id="searchBtn">Search</button>
        </div>

        <div class="weather-box">
            <h2 id="cityName">City Name</h2>
            <h1 id="temp">--°C</h1>
            <p id="condition">Weather Condition</p>

            <div class="details">
                <p>Humidity: <span id="humidity">--</span>%</p>
                <p>Wind: <span id="wind">--</span> km/h</p>
            </div>
        </div>
    </div>

    <script>
        const apiKey = "YOUR_API_KEY";

const cityInput = document.getElementById("cityInput");
const searchBtn = document.getElementById("searchBtn");

searchBtn.addEventListener("click", () => {
    getWeather(cityInput.value);
});

async function getWeather(city) {

    const url =
    `https://api.openweathermap.org/data/2.5/weather?q=${city},PK&units=metric&appid=${apiKey}`;

    try {

        const response = await fetch(url);
        const data = await response.json();

        if(data.cod == "404"){
            alert("City Not Found");
            return;
        }

        document.getElementById("cityName").innerText =
        data.name;

        document.getElementById("temp").innerText =
        Math.round(data.main.temp) + "°C";

        document.getElementById("condition").innerText =
        data.weather[0].description;

        document.getElementById("humidity").innerText =
        data.main.humidity;

        document.getElementById("wind").innerText =
        data.wind.speed;

    } catch(error){
        alert("Error Fetching Weather");
    }
}
    </script>
</body>
</html>
