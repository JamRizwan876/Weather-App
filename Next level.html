<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Restaurant Website</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
}

header{
    background:#ff5722;
    color:white;
    text-align:center;
    padding:20px;
}

.cart{
    text-align:center;
    background:white;
    padding:15px;
    font-size:22px;
    font-weight:bold;
    margin:20px;
    border-radius:10px;
}

.food-container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.food-card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,0,0,.2);
    text-align:center;
    transition:.3s;
}

.food-card:hover{
    transform:translateY(-5px);
}

.food-card img{
    width:100%;
    height:220px;
    object-fit:cover;
    cursor:pointer;
}

.food-card h3{
    margin:10px;
}

.price{
    color:green;
    font-size:22px;
    font-weight:bold;
}

button{
    background:#ff5722;
    color:white;
    border:none;
    padding:10px 20px;
    margin:10px;
    cursor:pointer;
    border-radius:5px;
}

button:hover{
    background:#e64a19;
}
</style>

</head>
<body>

<header>
    <h1>Delicious Food Restaurant</h1>
    <p>Click Image For Details</p>
</header>

<div class="cart">
    Cart Items: <span id="cartCount">0</span>
</div>

<div class="food-container">

    <div class="food-card">
        <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=600"
        onclick="burger()">
        <h3>Zinger Burger</h3>
        <p class="price">Rs.850</p>
        <button onclick="addToCart()">Add To Cart</button>
    </div>

    <div class="food-card">
        <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=600"
        onclick="pizza()">
        <h3>Pizza</h3>
        <p class="price">Rs.1800</p>
        <button onclick="addToCart()">Add To Cart</button>
    </div>

    <div class="food-card">
        <img src="https://images.unsplash.com/photo-1589302168068-964664d93dc0?w=600"
        onclick="biryani()">
        <h3>Chicken Biryani</h3>
        <p class="price">Rs.450</p>
        <button onclick="addToCart()">Add To Cart</button>
    </div>

    <div class="food-card">
        <img src="https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9?w=600"
        onclick="pasta()">
        <h3>Pasta</h3>
        <p class="price">Rs.700</p>
        <button onclick="addToCart()">Add To Cart</button>
    </div>

    <div class="food-card">
        <img src="https://images.unsplash.com/photo-1528735602780-2552fd46c7af?w=600"
        onclick="sandwich()">
        <h3>Club Sandwich</h3>
        <p class="price">Rs.600</p>
        <button onclick="addToCart()">Add To Cart</button>
    </div>

    <div class="food-card">
        <img src="https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=600"
        onclick="shawarma()">
        <h3>Shawarma</h3>
        <p class="price">Rs.300</p>
        <button onclick="addToCart()">Add To Cart</button>
    </div>

    <div class="food-card">
        <img src="https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=600"
        onclick="fries()">
        <h3>French Fries</h3>
        <p class="price">Rs.250</p>
        <button onclick="addToCart()">Add To Cart</button>
    </div>

    <div class="food-card">
        <img src="https://images.unsplash.com/photo-1608039755401-742074f0548d?w=600"
        onclick="nuggets()">
        <h3>Chicken Nuggets</h3>
        <p class="price">Rs.500</p>
        <button onclick="addToCart()">Add To Cart</button>
    </div>

    <div class="food-card">
        <img src="https://images.unsplash.com/photo-1563805042-7684c019e1cb?w=600"
        onclick="iceCream()">
        <h3>Ice Cream</h3>
        <p class="price">Rs.350</p>
        <button onclick="addToCart()">Add To Cart</button>
    </div>

    <div class="food-card">
        <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=600"
        onclick="coffee()">
        <h3>Coffee</h3>
        <p class="price">Rs.400</p>
        <button onclick="addToCart()">Add To Cart</button>
    </div>

</div>

<script>

let cart = 0;

function addToCart(){
    cart++;
    document.getElementById("cartCount").innerText = cart;
    alert("Food Added To Cart");
}

function burger(){
    alert("🍔 Zinger Burger\nPrice: Rs.850\nFresh Chicken Burger");
}

function pizza(){
    alert("🍕 Pizza\nPrice: Rs.1800\nLarge Family Pizza");
}

function biryani(){
    alert("🍛 Chicken Biryani\nPrice: Rs.450");
}

function pasta(){
    alert("🍝 Pasta\nPrice: Rs.700");
}

function sandwich(){
    alert("🥪 Club Sandwich\nPrice: Rs.600");
}

function shawarma(){
    alert("🌯 Shawarma\nPrice: Rs.300");
}

function fries(){
    alert("🍟 French Fries\nPrice: Rs.250");
}

function nuggets(){
    alert("🍗 Chicken Nuggets\nPrice: Rs.500");
}

function iceCream(){
    alert("🍨 Ice Cream\nPrice: Rs.350");
}

function coffee(){
    alert("☕ Coffee\nPrice: Rs.400");
}

</script>

</body>
</html>
